<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obsidian Vault Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f4ef;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --panel-soft: rgba(248, 250, 251, 0.95);
      --text: #20252b;
      --muted: #66717f;
      --border: rgba(37, 48, 62, 0.12);
      --shadow: 0 18px 40px rgba(29, 39, 54, 0.08);
      --accent: #2f6f6d;
      --accent-2: #193f55;
      --code-bg: #eef3f8;
      --warn: #9a5725;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(47, 111, 109, 0.09), transparent 36%),
        linear-gradient(315deg, rgba(141, 115, 63, 0.08), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 1rem 1rem 2rem;
    }

    .workspace {
      display: grid;
      gap: 1rem;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem 1rem;
      align-items: end;
      justify-content: space-between;
      padding: 1rem 1rem 0.2rem;
    }

    .hero-copy {
      max-width: 62ch;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(1.95rem, 3.5vw, 3.25rem);
      line-height: 1.08;
    }

    .hero-copy p {
      margin: 0.6rem 0 0;
      color: #3c4756;
      font-size: 1.03rem;
      line-height: 1.7;
    }

    .hero-meta {
      min-width: min(100%, 340px);
      display: grid;
      gap: 0.7rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .panel h2 {
      margin: 0 0 0.7rem;
      font-size: 1rem;
    }

    .control-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .control {
      display: grid;
      gap: 0.35rem;
    }

    .control span {
      font-size: 0.82rem;
      color: var(--muted);
    }

    select,
    .search-form input[type="search"] {
      width: 100%;
      color: var(--text);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    select {
      padding: 0.82rem 0.9rem;
    }

    .search-panel {
      display: grid;
      gap: 0.9rem;
    }

    .search-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.55rem;
    }

    .search-form input[type="search"] {
      padding: 0.62rem 0.85rem;
    }

    .search-form button,
    .search-back {
      border: 1px solid rgba(25, 63, 85, 0.16);
      border-radius: 8px;
      padding: 0.62rem 0.95rem;
      font-weight: 700;
    }

    .search-form button {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .search-back {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
    }

    .search-back:hover {
      text-decoration: none;
    }

    .search-result {
      padding: 0.85rem 0;
      border-top: 1px solid var(--border);
    }

    .search-result:first-of-type {
      border-top: 0;
      padding-top: 0.15rem;
    }

    .search-result-title {
      display: inline-block;
      font-weight: 700;
    }

    .search-result-meta {
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .search-result-excerpt {
      margin: 0.35rem 0 0;
      color: #3c4756;
      line-height: 1.65;
    }

    .search-hit {
      background: rgba(255, 217, 102, 0.92);
      color: inherit;
      padding: 0 0.18rem;
      border-radius: 0.25rem;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .note-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .note-link {
      display: inline-flex;
      align-items: center;
      padding: 0.55rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.78);
      color: var(--text);
    }

    .note-link.active {
      border-color: rgba(47, 111, 109, 0.42);
      background: rgba(47, 111, 109, 0.1);
      color: var(--accent-2);
      font-weight: 700;
    }

    .note-link:hover {
      text-decoration: none;
    }

    .breadcrumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      font-size: 0.86rem;
      color: var(--muted);
      padding: 0 0.25rem;
    }

    .crumb-sep {
      opacity: 0.55;
    }

    .note-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .note-header {
      padding: 1.45rem 1.45rem 1rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.72));
      border-bottom: 1px solid var(--border);
    }

    .note-header h1 {
      margin: 0.2rem 0 0;
      font-size: clamp(1.7rem, 3vw, 2.65rem);
      line-height: 1.15;
    }

    .note-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .note-body {
      padding: 1.45rem 1.5rem 1.8rem;
      font-size: 1.03rem;
      line-height: 1.8;
      background: var(--panel-strong);
    }

    .note-body h1,
    .note-body h2,
    .note-body h3,
    .note-body h4,
    .note-body h5,
    .note-body h6 {
      scroll-margin-top: 1rem;
      line-height: 1.25;
      margin-top: 1.6em;
      margin-bottom: 0.45em;
    }

    .note-body p {
      margin: 0.7em 0;
    }

    .note-body ul,
    .note-body ol {
      padding-left: 1.3rem;
    }

    .note-body li {
      margin: 0.3em 0;
    }

    .note-body blockquote {
      margin: 1.1rem 0;
      padding: 0.9rem 1rem;
      border-left: 4px solid var(--accent);
      background: rgba(47, 111, 109, 0.07);
      color: #354052;
      border-radius: 0 8px 8px 0;
    }

    .note-body code {
      padding: 0.15rem 0.35rem;
      background: var(--code-bg);
      border-radius: 6px;
      font-size: 0.95em;
    }

    .note-body pre {
      overflow: auto;
      padding: 1rem;
      background: #111827;
      color: #eef2ff;
      border-radius: 8px;
    }

    .note-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .note-body img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: 500px;
      object-fit: contain;
      margin: 1rem 0;
      border-radius: 8px;
    }

    .note-body hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .wikilink {
      color: #1d6462;
      font-weight: 600;
    }

    .wikilink.unresolved {
      color: var(--warn);
      background: rgba(255, 193, 125, 0.25);
      padding: 0.05rem 0.25rem;
      border-radius: 0.35rem;
    }

    .section-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 1rem;
    }

    .stack {
      display: grid;
      gap: 1rem;
    }

    .link-list,
    .outline-list {
      list-style: none;
      padding: 0;
      margin: 0.35rem 0 0;
    }

    .link-list li,
    .outline-list li {
      margin: 0.28rem 0;
    }

    .muted {
      color: var(--muted);
      margin: 0.3rem 0 0;
    }

    .eyebrow {
      margin: 0;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 0.77rem;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .folder-summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .folder-summary strong {
      font-size: 1rem;
    }

    .status-line {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .error {
      color: #82351e;
      background: rgba(255, 220, 200, 0.48);
      border: 1px solid rgba(130, 53, 30, 0.18);
    }

    @media (max-width: 880px) {
      .page {
        padding: 0.75rem 0.75rem 1.5rem;
      }

      .hero {
        padding: 0.6rem 0.25rem 0.1rem;
      }

      .control-row,
      .section-grid,
      .search-form {
        grid-template-columns: 1fr;
      }

      .note-body {
        padding: 1.1rem;
      }

      .note-header {
        padding: 1.15rem 1.1rem 0.95rem;
      }

      .hero-meta {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <main id="app" class="page">
    <section class="workspace">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Vault</p>
          <h1>Obsidian 읽기모드 뷰어</h1>
          <p>노트 데이터를 불러오는 중입니다.</p>
        </div>
      </header>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script>
    const APP_NAME = 'Obsidian Vault Reader';
    const DEFAULT_VAULT_LABEL = 'Obsidian';
    const IGNORED_FILES = new Set(['AGENTS.md']);
    const app = document.getElementById('app');
    const markdown = window.markdownit
      ? window.markdownit({ html: true, breaks: true, linkify: true, typographer: true })
      : null;

    let notes = [];
    let noteByPath = new Map();
    let noteByAlias = new Map();
    let backlinks = new Map();
    let tree = null;
    let loadStatus = 'GitHub repository notes';
    let vaultLabel = DEFAULT_VAULT_LABEL;

    function esc(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function slugify(text) {
      return String(text)
        .normalize('NFKC')
        .trim()
        .toLowerCase()
        .replace(/['"'\u2019\u2018]/g, '')
        .replace(/[^\p{L}\p{N}]+/gu, '-')
        .replace(/^-+|-+$/g, '')
        .replace(/-{2,}/g, '-');
    }

    function normalizeLookup(text) {
      return String(text)
        .normalize('NFKC')
        .replace(/\.md$/i, '')
        .replace(/['"'\u2019\u2018]/g, '')
        .replace(/[^\p{L}\p{N}\/]+/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function stripMarkdownPreview(text) {
      return String(text)
        .replace(/!\[\[[^\]]+\]\]/g, ' ')
        .replace(/\[\[([^\]]+)\]\]/g, '$1')
        .replace(/[#>*_`~\-]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function escapeRegExp(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function encodeSegments(relPath) {
      return relPath
        .split('/')
        .map((segment) => encodeURIComponent(segment))
        .join('/');
    }

    function dirname(relPath) {
      const parts = relPath.split('/');
      parts.pop();
      return parts.length ? parts.join('/') : '.';
    }

    function basename(relPath, ext = '') {
      const name = relPath.split('/').pop() || '';
      return ext && name.toLowerCase().endsWith(ext.toLowerCase()) ? name.slice(0, -ext.length) : name;
    }

    function pagePath() {
      return window.location.pathname || 'index.html';
    }

    function noteUrl(note, heading = '') {
      const section = heading ? `#${encodeURIComponent(heading)}` : '';
      return `${pagePath()}?note=${encodeSegments(note.relPathNoExt)}${section}`;
    }

    function searchUrl(query) {
      const value = String(query || '').trim();
      return value ? `${pagePath()}?search=${encodeURIComponent(value)}` : `${pagePath()}?search=`;
    }

    function currentRoute() {
      const params = new URLSearchParams(window.location.search);
      if (params.has('search')) {
        return { type: 'search', query: params.get('search') || '' };
      }
      if (params.has('note')) {
        return { type: 'note', path: params.get('note') || '' };
      }
      return { type: 'home' };
    }

    function inferGitHubRepository() {
      const host = window.location.hostname;
      if (!host.endsWith('github.io')) {
        return null;
      }

      const owner = host.replace(/\.github\.io$/, '');
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      if (!owner) {
        return null;
      }

      if (pathParts.length === 0) {
        return { owner, repo: `${owner}.github.io` };
      }
      return { owner, repo: pathParts[0] };
    }

    function setVaultLabelFromGitHubRepository() {
      const repo = inferGitHubRepository();
      vaultLabel = repo?.repo || DEFAULT_VAULT_LABEL;
    }

    async function loadNotesFromGitHub() {
      const repo = inferGitHubRepository();
      if (!repo) {
        return [];
      }

      const repoResponse = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.repo}`);
      if (!repoResponse.ok) {
        throw new Error(`GitHub repo metadata request failed: ${repoResponse.status}`);
      }
      const repoInfo = await repoResponse.json();
      const branch = repoInfo.default_branch || 'main';

      const treeResponse = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.repo}/git/trees/${encodeURIComponent(branch)}?recursive=1`);
      if (!treeResponse.ok) {
        throw new Error(`GitHub tree request failed: ${treeResponse.status}`);
      }
      const treeInfo = await treeResponse.json();
      const files = (treeInfo.tree || [])
        .filter((entry) => entry.type === 'blob')
        .map((entry) => entry.path)
        .filter((relPath) => shouldLoadMarkdown(relPath));

      const loaded = await Promise.all(files.map(async (relPath) => {
        const url = `https://raw.githubusercontent.com/${repo.owner}/${repo.repo}/${encodeURIComponent(branch)}/${relPath.split('/').map(encodeURIComponent).join('/')}`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Raw markdown request failed: ${relPath}`);
        }
        return { relPath, raw: await response.text() };
      }));

      return loaded;
    }

    function shouldLoadMarkdown(relPath) {
      const fileName = basename(relPath);
      if (!relPath.endsWith('.md')) {
        return false;
      }
      if (relPath.startsWith('.git/') || relPath.includes('/.git/')) {
        return false;
      }
      return !IGNORED_FILES.has(fileName);
    }

    function normalizeNotes(rawNotes) {
      const result = rawNotes
        .filter((item) => shouldLoadMarkdown(item.relPath))
        .map((item) => {
          const relPath = item.relPath.replace(/\\/g, '/');
          const raw = String(item.raw || '');
          const lines = raw.split(/\r?\n/);
          const firstHeading = lines.find((line) => /^#\s+/.test(line));
          const title = firstHeading ? firstHeading.replace(/^#\s+/, '').trim() : basename(relPath, '.md');
          const relPathNoExt = relPath.replace(/\.md$/i, '');
          const folder = dirname(relPath);
          return {
            relPath,
            relPathNoExt,
            folder,
            basename: basename(relPath, '.md'),
            raw,
            searchText: normalizeLookup([relPathNoExt, basename(relPath, '.md'), title, raw].join(' ')),
            title
          };
        });

      result.sort((a, b) => a.relPath.localeCompare(b.relPath, 'ko', { sensitivity: 'base', numeric: true }));
      return result;
    }

    function buildAliasIndex(noteList) {
      const index = new Map();
      const push = (alias, note) => {
        const key = normalizeLookup(alias);
        if (key && !index.has(key)) {
          index.set(key, note);
        }
      };

      for (const note of noteList) {
        push(note.relPathNoExt, note);
        push(note.basename, note);
        push(note.title, note);
        push(note.relPath, note);
        push(note.relPathNoExt.split('/').pop(), note);
      }

      return index;
    }

    function buildBacklinks(noteList) {
      const backlinksMap = new Map();
      for (const note of noteList) {
        backlinksMap.set(note.relPathNoExt, new Set());
      }
      for (const note of noteList) {
        const outgoing = collectWikiTargets(note.raw, note.relPathNoExt);
        for (const target of outgoing) {
          const resolved = resolveTarget(target.target, note.relPathNoExt);
          if (resolved) {
            backlinksMap.get(resolved.note.relPathNoExt)?.add(note.relPathNoExt);
          }
        }
      }
      return backlinksMap;
    }

    function buildTree(noteList) {
      const root = { name: '', path: '', type: 'dir', children: new Map(), notes: [] };
      for (const note of noteList) {
        const parts = note.relPath.split('/');
        let node = root;
        for (let i = 0; i < parts.length - 1; i += 1) {
          const part = parts[i];
          if (!node.children.has(part)) {
            node.children.set(part, {
              name: part,
              path: parts.slice(0, i + 1).join('/'),
              type: 'dir',
              children: new Map(),
              notes: []
            });
          }
          node = node.children.get(part);
        }
        node.notes.push(note);
      }
      return root;
    }

    function extractLeadingNumber(text) {
      const match = String(text).match(/^(\d+)/);
      return match ? Number(match[1]) : null;
    }

    function compareFolders(a, b) {
      return a.name.localeCompare(b.name, 'ko', { sensitivity: 'base', numeric: true });
    }

    function compareFolderNotes(folderName, a, b) {
      const aOverview = a.basename === folderName;
      const bOverview = b.basename === folderName;
      if (aOverview !== bOverview) {
        return aOverview ? -1 : 1;
      }

      const aNumber = extractLeadingNumber(a.basename);
      const bNumber = extractLeadingNumber(b.basename);
      if (aNumber !== null && bNumber !== null && aNumber !== bNumber) {
        return aNumber - bNumber;
      }
      if (aNumber !== null && bNumber === null) {
        return -1;
      }
      if (aNumber === null && bNumber !== null) {
        return 1;
      }

      const titleDiff = a.basename.localeCompare(b.basename, 'ko', { sensitivity: 'base', numeric: true });
      if (titleDiff !== 0) {
        return titleDiff;
      }
      return a.relPath.localeCompare(b.relPath, 'ko', { sensitivity: 'base', numeric: true });
    }

    function getFolders() {
      const rootFolder = notes.some((note) => note.folder === '.')
        ? { name: '.', path: '', type: 'dir', children: new Map(), notes: notes.filter((note) => note.folder === '.') }
        : null;
      const folders = [...tree.children.values()].sort(compareFolders);
      return [rootFolder, ...folders].filter(Boolean);
    }

    function getFolderNotes(folderName) {
      if (!folderName || folderName === '.') {
        return notes.filter((note) => note.folder === '.').sort((a, b) => compareFolderNotes(folderName, a, b));
      }
      const folder = tree.children.get(folderName);
      if (!folder) {
        return [];
      }
      return [...folder.notes].sort((a, b) => compareFolderNotes(folderName, a, b));
    }

    function getFolderIntroNote(folderName) {
      const notesInFolder = getFolderNotes(folderName);
      if (!notesInFolder.length) {
        return null;
      }
      const exact = notesInFolder.find((note) => note.basename === folderName);
      return exact || notesInFolder[0];
    }

    function getDefaultFolderName() {
      const folders = getFolders();
      if (folders.length) {
        return folders[0].name;
      }
      return '';
    }

    function getDefaultNote() {
      const defaultFolder = getDefaultFolderName();
      const intro = defaultFolder ? getFolderIntroNote(defaultFolder) : null;
      return intro || notes[0] || null;
    }

    function getSelectedFolderName(note) {
      if (note && note.folder !== '.') {
        return note.folder;
      }
      if (note && note.folder === '.') {
        return '.';
      }
      return getDefaultFolderName();
    }

    function collectWikiTargets(raw, currentRelPathNoExt) {
      const targets = [];
      const lines = raw.split(/\r?\n/);
      let inFence = false;

      for (const line of lines) {
        if (/^\s*```/.test(line)) {
          inFence = !inFence;
          continue;
        }
        if (inFence) {
          continue;
        }

        line.replace(/(!?)\[\[([^\]]+)\]\]/g, (match, embed, target) => {
          targets.push({ embed: embed === '!', target, currentRelPathNoExt });
          return match;
        });
      }
      return targets;
    }

    function resolveTarget(rawTarget, currentRelPathNoExt) {
      const [pathPart, headingPart] = String(rawTarget).split('#');
      const trimmedPath = pathPart.trim();
      const candidates = [];

      if (trimmedPath) {
        candidates.push(trimmedPath);
        candidates.push(trimmedPath.replace(/\.md$/i, ''));

        if (!trimmedPath.includes('/')) {
          const currentFolder = dirname(currentRelPathNoExt);
          if (currentFolder && currentFolder !== '.') {
            candidates.push(`${currentFolder}/${trimmedPath}`);
            candidates.push(`${currentFolder}/${trimmedPath.replace(/\.md$/i, '')}`);
          }
        }
      }

      for (const candidate of candidates) {
        const exact = noteByPath.get(candidate.replace(/\.md$/i, ''));
        if (exact) {
          return { note: exact, heading: headingPart ? slugify(headingPart) : null };
        }
      }

      for (const candidate of candidates) {
        const resolved = noteByAlias.get(normalizeLookup(candidate));
        if (resolved) {
          return { note: resolved, heading: headingPart ? slugify(headingPart) : null };
        }
      }

      return null;
    }

    function renderWikiLinks(raw, currentRelPathNoExt, collectedTargets) {
      const lines = raw.split(/\r?\n/);
      const out = [];
      let inFence = false;

      for (const line of lines) {
        if (/^\s*```/.test(line)) {
          inFence = !inFence;
          out.push(line);
          continue;
        }

        if (inFence) {
          out.push(line);
          continue;
        }

        out.push(line.replace(/(!?)\[\[([^\]]+)\]\]/g, (match, embed, body) => {
          const [targetPart, labelPart] = body.split('|');
          const target = targetPart.trim();
          const label = (labelPart || targetPart).trim();
          const resolved = resolveTarget(target, currentRelPathNoExt);
          if (resolved) {
            collectedTargets.push(resolved.note.relPathNoExt);
            const cls = embed === '!' ? 'wikilink embed' : 'wikilink';
            return `<a class="${cls}" href="${noteUrl(resolved.note, resolved.heading || '')}">${esc(label)}</a>`;
          }
          return `<span class="wikilink unresolved">[[${esc(label)}]]</span>`;
        }));
      }

      return out.join('\n');
    }

    function uniqueHeadingSlugs(container) {
      const seen = new Map();
      const headings = [];
      container.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach((heading) => {
        const title = heading.textContent || '';
        const level = Number(heading.tagName.slice(1));
        const baseSlug = slugify(title) || 'section';
        const count = seen.get(baseSlug) || 0;
        const slug = count === 0 ? baseSlug : `${baseSlug}-${count + 1}`;
        seen.set(baseSlug, count + 1);
        heading.id = slug;
        headings.push({ level, title, slug });
      });
      return headings;
    }

    function fallbackMarkdown(raw) {
      const blocks = String(raw || '').split(/\n{2,}/);
      return blocks.map((block) => {
        const text = block.trim();
        if (!text) {
          return '';
        }
        const heading = text.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          const level = heading[1].length;
          return `<h${level}>${esc(heading[2])}</h${level}>`;
        }
        return `<p>${esc(text).replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
    }

    function renderMarkdown(raw, currentRelPathNoExt, meta) {
      const transformed = renderWikiLinks(raw, currentRelPathNoExt, meta.outgoing);
      const html = markdown ? markdown.render(transformed) : fallbackMarkdown(transformed);
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;
      meta.headings = uniqueHeadingSlugs(wrapper);
      return wrapper.innerHTML;
    }

    function searchNotes(query) {
      const normalizedQuery = normalizeLookup(query);
      if (!normalizedQuery) {
        return [];
      }

      return notes
        .filter((note) => note.searchText.includes(normalizedQuery))
        .map((note) => ({ note, excerpt: buildSearchExcerpt(note, query) }))
        .sort((a, b) => {
          const titleDiff = a.note.title.localeCompare(b.note.title, 'ko', { sensitivity: 'base', numeric: true });
          if (titleDiff !== 0) {
            return titleDiff;
          }
          return a.note.relPath.localeCompare(b.note.relPath, 'ko', { sensitivity: 'base', numeric: true });
        });
    }

    function buildSearchExcerpt(note, query) {
      const normalizedQuery = normalizeLookup(query);
      if (!normalizedQuery) {
        return '';
      }

      const lines = note.raw.split(/\r?\n/);
      const lowerRawQuery = String(query).toLowerCase();
      for (const line of lines) {
        const normalizedLine = normalizeLookup(line);
        const lowerLine = line.toLowerCase();
        if ((lowerRawQuery && lowerLine.includes(lowerRawQuery)) || (normalizedQuery && normalizedLine.includes(normalizedQuery))) {
          return stripMarkdownPreview(line);
        }
      }

      return stripMarkdownPreview(note.raw.slice(0, 180));
    }

    function highlightExcerpt(excerpt, query) {
      const text = String(excerpt || '');
      const trimmed = String(query || '').trim();
      if (!trimmed) {
        return esc(text);
      }

      const pattern = new RegExp(escapeRegExp(trimmed), 'ig');
      let lastIndex = 0;
      let out = '';
      let matched = false;

      for (const match of text.matchAll(pattern)) {
        matched = true;
        const start = match.index ?? 0;
        const value = match[0];
        out += esc(text.slice(lastIndex, start));
        out += `<mark class="search-hit">${esc(value)}</mark>`;
        lastIndex = start + value.length;
      }

      if (!matched) {
        return esc(text);
      }

      out += esc(text.slice(lastIndex));
      return out;
    }

    function renderSearchPanel(query = '') {
      const trimmed = String(query || '').trim();
      return `
          <section class="panel search-panel">
            <div class="folder-summary">
              <div>
                <strong>전체 검색</strong>
                <div class="subtle">${esc(loadStatus)}</div>
              </div>
            </div>
            <form class="search-form" id="search-form">
              <input
                type="search"
                name="q"
                value="${esc(trimmed)}"
                placeholder="제목·본문·링크에서 키워드 검색"
                autocomplete="off"
                spellcheck="false"
              />
              <button type="submit">검색</button>
            </form>
          </section>
        `;
    }

    function renderFolderSelect(currentFolderName) {
      const folders = getFolders();
      const options = folders.map((folder) => {
        const intro = getFolderIntroNote(folder.name);
        const target = intro || folder.notes[0] || null;
        const value = target ? noteUrl(target) : '#';
        const selected = folder.name === currentFolderName ? ' selected' : '';
        const count = folder.notes.length;
        const label = folder.name === '.' ? 'Root' : folder.name;
        return `<option value="${esc(value)}"${selected}>${esc(label)} (${count})</option>`;
      }).join('');

      if (!options) {
        return `
            <label class="control">
              <span>폴더</span>
              <select disabled><option>Root</option></select>
            </label>
          `;
      }

      return `
          <label class="control">
            <span>폴더</span>
            <select id="folder-select" aria-label="폴더 선택">${options}</select>
          </label>
        `;
    }

    function renderNoteSelect(notesInFolder, currentRelPathNoExt) {
      const options = notesInFolder.map((note) => {
        const selected = note.relPathNoExt === currentRelPathNoExt ? ' selected' : '';
        return `<option value="${esc(noteUrl(note))}"${selected}>${esc(note.basename)}</option>`;
      }).join('');

      if (!options) {
        return `
            <label class="control">
              <span>문서</span>
              <select disabled><option>문서 없음</option></select>
            </label>
          `;
      }

      return `
          <label class="control">
            <span>문서</span>
            <select id="note-select" aria-label="문서 선택">${options}</select>
          </label>
        `;
    }

    function renderNoteLinks(notesInFolder, currentRelPathNoExt) {
      if (!notesInFolder.length) {
        return '<p class="muted">이 폴더에 표시할 문서가 없습니다.</p>';
      }

      return `
          <div class="note-links">
            ${notesInFolder.map((note) => {
        const active = note.relPathNoExt === currentRelPathNoExt ? ' active' : '';
        return `<a class="note-link${active}" href="${esc(noteUrl(note))}">${esc(note.basename)}</a>`;
      }).join('')}
          </div>
        `;
    }

    function renderOutline(headings) {
      if (!headings || !headings.length) {
        return '<p class="muted">이 문서에는 개요가 없습니다.</p>';
      }
      return `<ul class="outline-list">${headings.map((heading) => {
        const indent = Math.max(0, heading.level - 1);
        return `<li style="margin-left:${indent * 0.75}rem"><a href="#${esc(heading.slug)}">${esc(heading.title)}</a></li>`;
      }).join('')}</ul>`;
    }

    function renderBacklinks(currentNote) {
      const incoming = [...(backlinks.get(currentNote.relPathNoExt) || [])]
        .map((relPathNoExt) => noteByPath.get(relPathNoExt))
        .filter(Boolean)
        .sort((a, b) => a.relPath.localeCompare(b.relPath, 'ko', { sensitivity: 'base', numeric: true }));

      if (!incoming.length) {
        return '<p class="muted">백링크가 없습니다.</p>';
      }

      return `<ul class="link-list">${incoming.map((note) => `<li><a href="${esc(noteUrl(note))}">${esc(note.basename)}</a></li>`).join('')}</ul>`;
    }

    function renderBreadcrumbs(note) {
      return note.relPathNoExt.split('/').map((part, idx, arr) => {
        const rel = arr.slice(0, idx + 1).join('/');
        const resolved = noteByPath.get(rel) || noteByAlias.get(normalizeLookup(rel));
        if (resolved) {
          return `<a href="${esc(noteUrl(resolved))}">${esc(part.replace(/\.md$/i, ''))}</a>`;
        }
        return `<span>${esc(part)}</span>`;
      }).join('<span class="crumb-sep">/</span>');
    }

    function renderApp(note, query = '') {
      if (!note) {
        app.innerHTML = `
            <section class="workspace">
              <header class="hero">
                <div class="hero-copy">
                  <p class="eyebrow">${esc(vaultLabel)} Vault</p>
                  <h1>표시할 노트가 없습니다</h1>
                  <p>GitHub Pages에서 repo의 Markdown 파일을 찾지 못했습니다.</p>
                </div>
              </header>
              <section class="panel error">Markdown 파일을 repo에 추가한 뒤 다시 배포하세요.</section>
            </section>
          `;
        document.title = APP_NAME;
        return;
      }

      const meta = { outgoing: [], headings: [] };
      const contentHtml = renderMarkdown(note.raw, note.relPathNoExt, meta);
      const selectedFolderName = getSelectedFolderName(note);
      const notesInFolder = selectedFolderName ? getFolderNotes(selectedFolderName) : [];
      const folder = selectedFolderName && selectedFolderName !== '.' ? tree.children.get(selectedFolderName) : null;
      const folderCount = folder ? folder.notes.length : notesInFolder.length;

      document.title = `${note.title} · ${APP_NAME}`;
      app.innerHTML = `
          <section class="workspace">
            <header class="hero">
              <div class="hero-copy">
                <p class="eyebrow">${esc(vaultLabel)} Vault</p>
                <h1>Obsidian 읽기모드 뷰어</h1>
              </div>
              <div class="hero-meta panel">
                <div class="control-row">
                  ${renderFolderSelect(selectedFolderName)}
                  ${renderNoteSelect(notesInFolder, note.relPathNoExt)}
                </div>
                <div class="subtle">현재 경로: ${esc(note.relPath)}</div>
              </div>
            </header>

            ${renderSearchPanel(query)}

            <div class="note-shell">
              <header class="note-header">
                <div class="breadcrumbs">${renderBreadcrumbs(note)}</div>
                <h1>${esc(note.title)}</h1>
                <div class="note-meta">
                  <span>${esc(note.relPath)}</span>
                  <span>${meta.outgoing.length} outgoing links</span>
                  <span>${(backlinks.get(note.relPathNoExt) || new Set()).size} backlinks</span>
                </div>
              </header>
              <article class="note-body">${contentHtml}</article>
            </div>

            <section class="section-grid">
              <div class="panel">
                <h2>개요</h2>
                ${renderOutline(meta.headings)}
              </div>
              <div class="panel">
                <h2>백링크</h2>
                ${renderBacklinks(note)}
              </div>
            </section>

            <section class="panel">
              <div class="folder-summary">
                <div>
                  <strong>${esc(selectedFolderName === '.' ? 'Root' : selectedFolderName || 'Root')}</strong>
                  <div class="subtle">${folderCount}개 문서</div>
                </div>
                <div class="subtle">${notes.length} notes · ${meta.outgoing.length} outgoing links</div>
              </div>
              ${renderNoteLinks(notesInFolder, note.relPathNoExt)}
            </section>
          </section>
        `;
      bindControls();
    }

    function renderSearchResultsPage(query) {
      const trimmed = String(query || '').trim();
      const results = trimmed ? searchNotes(trimmed) : [];
      const countLabel = trimmed ? `${results.length}개 결과` : '검색어를 입력하면 결과가 표시됩니다.';

      document.title = `${trimmed ? `${trimmed} 검색 결과` : '검색 결과'} · ${APP_NAME}`;
      app.innerHTML = `
          <section class="workspace">
            <header class="hero">
              <div class="hero-copy">
                <p class="eyebrow">${esc(vaultLabel)} Vault</p>
                <h1>검색 결과</h1>
                <p>${trimmed ? `${esc(trimmed)}를 포함한 노트를 전부 모아 보여줍니다.` : '검색어를 입력하면 결과가 표시됩니다.'}</p>
              </div>
              <div class="hero-meta panel">
                <a class="search-back" href="${esc(pagePath())}">홈으로</a>
                <div class="subtle">${esc(countLabel)}</div>
              </div>
            </header>

            ${renderSearchPanel(trimmed)}

            <section class="panel">
              <div class="folder-summary">
                <div>
                  <strong>${trimmed ? esc(trimmed) : '검색어 없음'}</strong>
                  <div class="subtle">${esc(countLabel)}</div>
                </div>
                <div class="subtle">전체 md 파일 검색</div>
              </div>
              ${trimmed
          ? results.map(({ note, excerpt }) => `
                    <article class="search-result">
                      <a class="search-result-title" href="${esc(noteUrl(note))}">${esc(note.title)}</a>
                      <div class="search-result-meta">${esc(note.relPath)}</div>
                      ${excerpt ? `<p class="search-result-excerpt">${highlightExcerpt(excerpt, trimmed)}</p>` : ''}
                    </article>
                  `).join('') || '<p class="muted">일치하는 노트가 없습니다.</p>'
          : '<p class="muted">검색창에 문자열을 입력하고 검색 버튼을 누르세요.</p>'
        }
            </section>
          </section>
        `;
      bindControls();
    }

    function bindControls() {
      const folderSelect = document.getElementById('folder-select');
      const noteSelect = document.getElementById('note-select');
      const searchForm = document.getElementById('search-form');

      if (folderSelect) {
        folderSelect.addEventListener('change', (event) => {
          if (event.target.value) {
            window.location.href = event.target.value;
          }
        });
      }
      if (noteSelect) {
        noteSelect.addEventListener('change', (event) => {
          if (event.target.value) {
            window.location.href = event.target.value;
          }
        });
      }
      if (searchForm) {
        searchForm.addEventListener('submit', (event) => {
          event.preventDefault();
          const form = new FormData(searchForm);
          window.location.href = searchUrl(form.get('q') || '');
        });
      }
    }

    function rebuildIndexes(rawNotes, status) {
      notes = normalizeNotes(rawNotes);
      noteByPath = new Map(notes.map((note) => [note.relPathNoExt, note]));
      noteByAlias = buildAliasIndex(notes);
      backlinks = buildBacklinks(notes);
      tree = buildTree(notes);
      loadStatus = status;
    }

    function renderRoute() {
      const route = currentRoute();
      if (route.type === 'search') {
        renderSearchResultsPage(route.query);
        return;
      }

      if (route.type === 'note') {
        const note = noteByPath.get(route.path.replace(/\.md$/i, '')) || noteByAlias.get(normalizeLookup(route.path));
        renderApp(note || getDefaultNote());
        return;
      }

      renderApp(getDefaultNote());
    }

    async function bootstrap() {
      setVaultLabelFromGitHubRepository();

      try {
        const remoteNotes = await loadNotesFromGitHub();
        rebuildIndexes(remoteNotes, 'GitHub repository notes');
        renderRoute();
      } catch (error) {
        rebuildIndexes([], 'GitHub sync unavailable');
        renderRoute();
        console.warn(error);
      }
    }

    window.addEventListener('popstate', renderRoute);
    bootstrap();
  </script>
</body>

</html>
